<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Wishlist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:insert="~{fragments/header :: header}"></div>

<main class="container py-5" style="max-width: 75%;">
    <div class="row">
        <div class="col text-center">
            <h1>My Wishlist</h1>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col text-center">
            <a href="/wishlist/new"
               th:href="@{/wishlist/new}"
               class="btn btn-outline-secondary text-center">New Wishlist Item</a>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <table class="table">
                <thead>
                <tr>
                    <th>ISBN</th>
                    <th>Title</th>
                    <th>Functions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${wishlist}">
                    <td th:text="${item.isbn}">9780000000000</td>
                    <td th:text="${item.title}">Book Title</td>
                    <td>
                        <a href="#">Edit</a> |
                        <a href="#">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
