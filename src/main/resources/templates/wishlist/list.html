<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Wishlist</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<!-- Header -->
<div th:insert="~{fragments/header :: header}"></div>

<main class="py-5 container" style="width: 50%;">

    <!-- Page Title -->
    <div class="text-center">
        <h1>My Wishlist</h1>
    </div>

    <!-- New Item Button -->
    <p class="text-center">
        <a th:href="@{/wishlist/new}"
           class="btn btn-outline-secondary">New Wishlist Item</a>
    </p>

    <!-- Table Render Area -->
    <div id="wishlist"></div>

</main>

<!-- Footer -->
<div th:insert="~{fragments/footer :: footer}"></div>

<!-- Scripts -->
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

<script>
    /**
     * HttpClient class for making API calls
     */
    class HttpClient {
        async get(url, params = "") {
            url = new URL(url);
            url.search = new URLSearchParams(params).toString();

            const res = await fetch(url.toString(), {
                method: 'GET'
            });

            return res.json();
        }
    }

    /**
     * Builds the wishlist table dynamically
     * @param books list of wishlist items
     * @returns HTML table string
     */
    function buildTable(books) {
        let tableString = '<table class="table"><tr><th>ISBN</th><th>Title</th><th>Functions</th></tr>';

        for (let book of books) {
            tableString += `<tr><td>${book.isbn}</td><td>${book.title}</td><td><a href="/wishlist/${book.id}">Edit</a> | <a href="/wishlist/remove/${book.id}">Delete</a></td></tr>`;
        }

        tableString += '</table>';

        return tableString;
    }

    // Create HTTP client instance
    const http = new HttpClient();

    // Call REST API and render table
    http.get('http://localhost:8080/api/wishlist')
        .then(res => {
            document.getElementById('wishlist').innerHTML = buildTable(res);
        })
        .catch(err => {
            console.error(err);
        });
</script>

</body>
</html>
