<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | View Wishlist Item</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:insert="~{fragments/header :: header}"></div>

<main class="container py-5" style="max-width: 60%;">
    <div class="row">
        <div class="col text-center">
            <h1>View Wishlist Item Form</h1>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <form action="#"
                  th:action="@{/wishlist/update}"
                  th:object="${wishlistItem}"
                  method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="isbn" class="form-label">ISBN</label>
                    <input type="text"
                           class="form-control"
                           id="isbn"
                           th:field="*{isbn}" />
                    <small th:if="${#fields.hasErrors('isbn')}"
                           style="color: red;"
                           th:errors="*{isbn}"></small>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text"
                           class="form-control"
                           id="title"
                           th:field="*{title}" />
                    <small th:if="${#fields.hasErrors('title')}"
                           style="color: red;"
                           th:errors="*{title}"></small>
                </div>

                <div class="mb-3 text-end">
                    <button type="submit" class="btn btn-primary">Update</button>
                </div>

                <div class="mb-3">
                    <a th:href="@{/wishlist}">Return to wishlist</a>
                </div>

            </form>
        </div>
    </div>
</main>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
