<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Monthly Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:insert="~{fragments/header :: header}"></div>

<main class="container py-5" style="max-width: 70%;">
    <div class="text-center">
        <h1>Monthly Books</h1>

        <p>
            <a th:href="@{/monthly-books/new}"
               class="btn btn-outline-secondary">New Monthly Book</a>
        </p>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>Month</th>
            <th>ISBN</th>
            <th>Functions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${monthlyBooks}">
            <td th:text="${book.month}">1</td>
            <td th:text="${book.isbn}">9780000000000</td>
            <td>
                <a th:href="@{/monthly-books/remove/{id}(id=${book.id})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
