<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Monthly Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:insert="~{/fragments/header :: header}"></div>

<main class="container py-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h2 th:text="${book.title}">Book Title</h2>
                </div>

                <div class="card-body">
                    <p class="card-text">
                        <strong>ISBN:</strong>
                        <span th:text="${book.isbn}">1234567890</span>
                    </p>

                    <p class="card-text">
                        <strong>Description:</strong>
                        <span th:text="${book.description}">Description</span>
                    </p>

                    <p class="card-text">
                        <strong>Number of Pages:</strong>
                        <span th:text="${book.numOfPages}">100</span>
                    </p>

                    <div class="card-text">
                        <strong>Authors:</strong>
                        <ul class="list-group list-group-flush mt-2">
                            <li class="list-group-item"
                                th:each="author : ${book.authors}"
                                th:text="${author}">
                                Author Name
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="card-footer">
                    <a th:href="@{/}" class="btn btn-secondary">Return</a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:insert="~{/fragments/footer :: footer}"></div>
<div th:insert="~{/fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
