<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Monthly Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:insert="~{fragments/header :: header}"></div>

<main class="container py-5" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-header text-center">
            <h2>Book of the month details</h2>
        </div>

        <div class="card-body">
            <h4 th:text="${book.title}">Book Title</h4>

            <p class="card-text">
                Pages:
                <span th:text="${book.numOfPages}">0</span>
            </p>

            <p class="card-text">
                <strong>Description:</strong>
                <br/>
                <span th:text="${book.description}">Description</span>
            </p>

            <p class="card-text">
                <strong>Web Link:</strong>
                <br/>
                <a href="#"
                   th:href="${book.infoUrl}"
                   th:text="${book.infoUrl}"
                   target="_blank">Web Link</a>
            </p>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/}" class="btn btn-outline-secondary">Return to books</a>
    </div>
</main>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
