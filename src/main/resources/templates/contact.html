<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Contact Us</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">

    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <!-- Header Fragment -->
    <div th:insert="~{fragments/header :: header}"></div>

    <main class="container py-5" style="max-width: 60%;">

        <div class="row">
            <div class="col text-center">
                <h1>Contact Us</h1>
                <p class="lead">We would love to hear from you!</p>
            </div>
        </div>

        <hr/>

        <!-- Contact Info Section -->
        <div class="row">

            <!-- Address -->
            <div class="col-md-6 text-center">
                <h4><i class="fas fa-location-arrow text-secondary"></i></h4>
                <ul class="list-group">
                    <li class="list-group-item border-0">1000 Galvin Road South</li>
                    <li class="list-group-item border-0">Bellevue, Nebraska 68005</li>
                </ul>
            </div>

            <!-- Phone -->
            <div class="col-md-6 text-center">
                <h4><i class="fas fa-phone text-secondary"></i></h4>
                <ul class="list-group">
                    <li class="list-group-item border-0">Direct: 555.555.5555</li>
                    <li class="list-group-item border-0">Toll-free: 1.800.555.5555</li>
                    <li class="list-group-item border-0">Fax: 555.555.5555</li>
                </ul>
            </div>

        </div>

    </main>

    <!-- Footer Fragments -->
    <div th:insert="~{fragments/footer :: footer}"></div>
    <div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
