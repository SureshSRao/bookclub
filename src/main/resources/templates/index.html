<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Welcome</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<!-- Header -->
<div th:insert="~{fragments/header :: header}"></div>

<main>

    <!-- Intro Section -->
    <section class="py-5 text-center container">
        <div class="row py-lg-4">
            <div class="col-lg-8 col-md-10 mx-auto">
                <h1 class="fw-light">Welcome to the Bookclub application!</h1>
                <p class="lead text-muted">
                    View this month's featured books and select one to see more details.
                </p>
            </div>
        </div>
    </section>

    <!-- Books Grid -->
    <div class="album py-5 bg-light">
        <div class="container">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">

                <!-- Book Card -->
                <div class="col" th:each="book : ${books}">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">

                            <!-- Title + ISBN -->
                            <p class="card-text">
                                <span th:text="${book.getTitle()}">Book Title</span>
                                <br/>
                                <small class="text-muted">
                                    <span th:text="${book.getIsbn()}">ISBN</span>
                                </small>
                            </p>

                            <!-- Buttons -->
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="btn-group">

                                    <!-- View Button -->
                                    <a th:href="@{/{id}(id=${book.getIsbn()})}"
                                       class="btn btn-sm btn-outline-secondary">
                                        View
                                    </a>

                                    <!-- Web Link Button -->
                                    <a th:href="${book.getInfoUrl()}"
                                       class="btn btn-sm btn-outline-secondary"
                                       target="_blank">
                                        Web Link
                                    </a>

                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</main>

<!-- Footer -->
<div th:insert="~{fragments/footer :: footer}"></div>

<!-- Scripts -->
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
